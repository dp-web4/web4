# Starter hub law — sensible defaults for a new Web4 community.
#
# ACCOUNTABILITY INVARIANT (RWOA + S + V — ratified hub-law, 2026-07-12).
# Every consequential act is authorized by a contextual preponderance of evidence
# scaled to the act's stakes and irreversibility (S), decided before side effects
# (O), committed atomically with its evidence-basis (A); reachability is weak
# evidence, not authority (R); witnessed identity+authority is strong (W);
# irreversible / high-consequence acts pass a catastrophic-risk veto (V) that may
# require a quorum of signatures by law; unclassified surfaces default to
# high-consequence. Genesis acts run in a bounded, self-witnessing bootstrap
# window that cannot be re-entered once witnessed authority exists.
#   Norm: private-context `accountability-invariant` thread.
#   Write-time self-audit every surface-changing PR runs: web4/CLAUDE.md
#   "Accountability self-audit (run before shipping a surface)".
#
# THE GRADIENT, NOT A FLIP. The defaults stay PERMISSIVE for low-stakes REVERSIBLE
# acts (DEFAULT-ALLOW below); CONSEQUENTIAL acts are gated at their stakes
# (escalate / deny). Keeping the base permissive is deliberate — a too-strict-
# everywhere gate breeds unsafe-override escape hatches that become the next
# reachability-is-authority holes. Tighten specific norms as your chapter matures.
#
# This file is a template. Edit it, then apply with:
#   hub set-law <chapter-dir> ./hub-law.yaml
#   curl -X POST http://localhost:8770/v1/admin/reload-law   # if serve is running
#
# Full schema: web4-standard/core-spec/hub-law-schema.md
# Hub interpreter: web4/hub/hub-lib/src/law.rs

version: "1.0.0"

# -----------------------------------------------------------------------------
# Norms — atomic rules. Highest-priority matching norm wins.
#   selector  : path into the R6 request (r6.role / r6.request.action /
#               r6.request.payload.<field> / r6.resource.<field>)
#   operator  : <= >= == != < > in not_in matches
#   decision  : allow | warn | deny | escalate
#   priority  : higher wins (default 0)
# -----------------------------------------------------------------------------
norms:
  # Default to ALLOW (priority 0). Specific deny/escalate norms below
  # override this for the sensitive operations.
  - id: DEFAULT-ALLOW
    selector: r6.request.action
    operator: "!="
    value: __never_match__
    decision: allow
    priority: 0
    description: "Default-allow base policy for low-stakes reversible acts. Specific norms override."

  # S conservative default (RWOA gradient): consequential governance event-kinds
  # escalate by default — above DEFAULT-ALLOW (0), below the specific named norms
  # (50-100) so a more-specific decision still wins. The gate evaluates
  # `r6.request.action` = the HubEvent kind (see check_governance / HubEvent::kind:
  # `member_added`, `role_assigned`, ...), so norm values are EVENT-KIND strings.
  # role_assigned / charter_amended / law_amended are covered by the named norms
  # below; this catches the other membership- and authority-mutating kinds.
  # Low-stakes / reversible / informational kinds (event_recorded,
  # member_profile_updated, reputation_recorded, reads, ...)
  # ride DEFAULT-ALLOW. Extend this list as new consequential kinds land.
  - id: ESCALATE-CONSEQUENTIAL-DEFAULT
    selector: r6.request.action
    operator: in
    value:
      - member_added
      - member_removed
      - member_admission_reset
      - council_member_added
      - council_member_removed
      - council_threshold_changed
      - pairing_revoked
    decision: escalate
    priority: 10
    description: "Consequential governance mutations escalate unless a more-specific norm decides them (RWOA S default)."

  # Admission is CLOSED by default (public-release P0, 2026-07-23): join
  # requests ESCALATE to the operator's admission queue instead of
  # auto-admitting. This norm — not the `admission.open` flag below, which is
  # advisory display metadata — is what the join gate actually evaluates
  # (`r6.request.action == member_join_request`, see rest.rs submit_join).
  # To opt into open admission, change this norm's decision to `allow`.
  - id: ESCALATE-MEMBER-JOIN
    selector: r6.request.action
    operator: "=="
    value: member_join_request
    decision: escalate
    priority: 90
    description: "Closed admission: join requests queue for operator review (change to allow for open admission)."

  # Charter amendments are high-impact; escalate to the Sovereign.
  - id: ESCALATE-CHARTER-AMEND
    selector: r6.request.action
    operator: "=="
    value: charter_amended
    decision: escalate
    priority: 100
    description: "Charter amendments require human Sovereign review."

  # Law amendments are even higher impact (they change the rules
  # themselves). Escalate.
  - id: ESCALATE-LAW-AMEND
    selector: r6.request.action
    operator: "=="
    value: law_amended
    decision: escalate
    priority: 100
    description: "Law amendments require human Sovereign review."

  # Role assignments touch governance; escalate by default. Loosen this
  # if your chapter delegates role assignment to an Administrator role.
  - id: ESCALATE-ROLE-ASSIGN
    selector: r6.request.action
    operator: "=="
    value: role_assigned
    decision: escalate
    priority: 50
    description: "Role assignment requires Sovereign / Administrator review."

# -----------------------------------------------------------------------------
# Procedures — process requirements attached to action classes.
# Today the procedures are descriptive (the hub doesn't enforce them
# directly); future sprints will gate acts on witness/quorum counts.
# -----------------------------------------------------------------------------
procedures:
  - id: WITNESS-3
    requires_witnesses: 3
    applies_to: "consequential_actions"
    description: "Consequential acts should accumulate 3 independent witnesses. Target (enforced as gating lands): the authority decision is a PREFLIGHT that dominates every side effect (O), and the act commits ATOMICALLY with its signed hash-chained record AND the evidence relied upon (A)."

# -----------------------------------------------------------------------------
# Delegation — when role-fillers can delegate to AI agents.
# -----------------------------------------------------------------------------
delegation:
  max_depth: 2
  requires_approval: true
  allowed_roles:
    - administrator
    - archivist
    - witness

# -----------------------------------------------------------------------------
# Escalation triggers — conditions that force review even when no norm
# explicitly says so. Independent of priority — any trigger that fires
# overrides Allow to Escalate (but cannot override Deny).
# -----------------------------------------------------------------------------
escalation:
  - condition: "r6.resource.atp > 100"
    escalate_to: sovereign
    description: "High-ATP acts (over 100) need Sovereign review."
  # V — catastrophic-risk veto on the irreversible tail. ATP magnitude above is
  # one stakes proxy; the ratified norm additionally vetoes/escalates IRREVERSIBLE
  # or high-consequence acts (a secret RELEASE — a read has no undo; an
  # irreversible law change; an operator-set change that could lock out)
  # regardless of any allow norm, and such escalation MAY require a quorum of
  # signatures by law. Reversible acts are risk-managed on preponderance; the
  # irreversible tail gets the conservative veto. (Enforced daemon-side as the
  # stakes classifier lands; stated here so the law carries the posture.)

# -----------------------------------------------------------------------------
# Admission — how new members join.
# -----------------------------------------------------------------------------
admission:
  # Closed admission by default: every membership request escalates to the
  # operator admission queue. Set `open: true` only if you want anyone with a
  # Web4 LCT to be auto-admitted. For most public chapters, leave this closed
  # and use `requires_sponsor: true` so existing members vouch for newcomers.
  open: false
  requires_sponsor: true
  min_trust_score: 0.0
  description: "Closed membership by default. Every join request is queued for operator review. Set open: true explicitly if you want auto-admission; use requires_sponsor: true for vouch-based chapters. NOTE: genesis acts (founding the society, minting the first authority) run in a bounded, self-witnessing bootstrap window that ratchets shut once witnessed authority exists — a fresh install is not a permanent open door."

# -----------------------------------------------------------------------------
# ATP issuance — how the chapter mints internal currency.
# -----------------------------------------------------------------------------
atp_issuance:
  mint_authority: treasurer
  max_mint_per_cycle: 1000
  distribution: proportional_to_contribution
  description: "Treasurer mints up to 1000 ATP per cycle, distributed by V3 contribution score."
