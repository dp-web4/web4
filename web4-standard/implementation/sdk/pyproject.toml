[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "web4"
version = "0.1.0"
description = "Web4 core data types and operations — trust tensors, LCTs, ATP/ADP lifecycle"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "Web4 Infrastructure Team"}]

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[tool.setuptools.packages.find]
include = ["web4*"]
