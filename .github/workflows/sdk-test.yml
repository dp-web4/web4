name: SDK Tests

on:
  push:
    branches: [main]
    paths:
      - 'web4-standard/implementation/sdk/**'
      - '.github/workflows/sdk-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web4-standard/implementation/sdk/**'
      - '.github/workflows/sdk-test.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web4-standard/implementation/sdk
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SDK and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check web4/ tests/test_*.py

      - name: Check formatting with ruff
        run: ruff format --check web4/ tests/test_*.py

      - name: Type check with mypy (strict)
        run: mypy web4/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    defaults:
      run:
        working-directory: web4-standard/implementation/sdk

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install SDK and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=web4 --cov-report=term-missing

  wheel:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web4-standard/implementation/sdk
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install from wheel in fresh environment
        run: |
          python -m venv /tmp/web4-wheel-test
          /tmp/web4-wheel-test/bin/pip install dist/web4-*.whl

      - name: Run selftest from installed wheel
        run: /tmp/web4-wheel-test/bin/web4 selftest

      - name: Verify CLI entry point
        run: /tmp/web4-wheel-test/bin/web4 info

      - name: Run quickstart example against installed wheel
        run: /tmp/web4-wheel-test/bin/python examples/quickstart.py
